repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: uv run bandit -r src
        language: system
        pass_filenames: false

      - id: vulture
        name: vulture
        entry: uv run vulture app.py src
        language: system
        pass_filenames: false

      - id: pip-audit
        name: pip-audit
        entry: uv run pip-audit
        language: system
        pass_filenames: false

      - id: pylint
        name: pylint
        entry: uv run pylint app.py
        language: system
        pass_filenames: false