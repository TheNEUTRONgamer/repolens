repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-r", "."]

  - repo: local
    hooks:
    - id: vulture
      name: vulture
      entry: uv run vulture app.py src tests
      language: system
      pass_filenames: false

    - id: pip-audit
      name: pip-audit
      entry: uv run pip-audit
      language: system
      pass_filenames: false