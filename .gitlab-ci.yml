stages:
  - lint
  - format
  - type_check
  - test
  - coverage

variables:
  UV_SYSTEM_PYTHON: "1"

default:
  image: python:3.12

before_script:
  - python --version
  - pip install uv
  - uv sync
  - export PYTHONPATH="$CI_PROJECT_DIR"

ruff:
  stage: lint
  script:
    - uv run ruff check .

ruff-format:
  stage: format
  script:
    - uv run ruff format --check .

mypy:
  stage: type_check
  script:
    - uv run mypy src

test:
  stage: test
  script:
    - uv run pytest

coverage:
  stage: coverage
  script:
    - pwd
    - ls -la
    - find . -maxdepth 2 -type f | sort
    - uv run python -c "import os, sys; print(os.getcwd()); print(sys.path)"
    - uv run python -c "import src; print(src.__file__)"
    - uv run pytest --cov=src --cov-report=term